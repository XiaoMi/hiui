    }

      50% { transform: translate(0, 0) rotate(0deg) scale(1); }
      75% { transform: translate(4px, -3px) rotate(6deg) scale(1.03); }
    }

    @keyframes a-right-orbit {

      25% { transform: translate(5px, -4px) rotate(8deg) scale(1.03); }
      50% { transform: translate(0, 0) rotate(0deg) scale(1); }
      75% { transform: translate(-4px, 3px) rotate(-6deg) scale(0.97); }
    }

    @media (prefers-reduced-motion: reduce) {

    }
