name: Version

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Please select the type to publish
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest
        default: 'latest'

jobs:
  update_version:
    name: Update Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get release branch timestamp
        id: release
        run: echo "id=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 14.21.x
        uses: actions/setup-node@v6
        with:
          node-version: 14.21.x
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn config set strict-ssl false
          yarn

      - name: Update Version
        run: yarn run v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.release.outputs.id }}${{ github.run_attempt }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --staged --quiet; then
            echo "No version changes to release"
            exit 0
          fi
          git commit -m "Generate version and changelog"
          git push origin "$BRANCH" --force-with-lease

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.release.outputs.id }}${{ github.run_attempt }}"
          if gh pr list --head "$BRANCH" --base master --json number --jq '.[0].number' | grep -q .; then
            echo "Pull request already exists for $BRANCH"
            exit 0
          fi
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Release" \
            --body "Update the version and changelog of the package"
