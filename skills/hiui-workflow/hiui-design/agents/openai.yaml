interface:
  display_name: "HiUI Design"
  short_description: "Plan and generate HiUI React pages through managed page-task plans and generation recipes"
  default_prompt: "Use $hiui-design for HiUI React page generation, modification, integration, migration, legacy/screenshot-to-HiUI translation, or validation. First locate the real project root and run the machine page-task plan. Do not manually infer mode, page type, topology, start point, required docs, required actions, acceptance scope, or final report fields. When the plan is ready, read only its requiredDocs, derive generation behavior from its generation strategy and generationRecipe, and execute only its requiredActions. When the plan is blocked or invalid, stop page generation and explain the missing facts. Treat preflight, governance, formal acceptance, and final-page-report status as the source of completion truth. Do not use this skill for PRD refinement, end-to-end workflow orchestration, Figma canvas writes/design generation, Figma-to-code implementation, or generic React refactoring; route those tasks to the dedicated skill or normal coding flow."
policy:
  allow_implicit_invocation: true
